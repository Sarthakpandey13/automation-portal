<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to DB Parser | Vahan Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .glass-panel {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .editor-container {
            position: relative;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 400px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            color: #38bdf8;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            outline: none;
            resize: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid #334155;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .status-badge {
            display: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 500;
            margin-top: 20px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); }

        .back-link {
            display: block;
            margin-top: 30px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .back-link:hover { opacity: 0.8; }

        /* Custom Scrollbar */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #0f172a; border-radius: 16px; }
        textarea::-webkit-scrollbar-thumb { background: #334155; border-radius: 16px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <header>
            <h1>JSON Matrix</h1>
            <p class="subtitle">Paste your vehicle JSON data to sync with the database</p>
        </header>

        <div class="editor-container">
            <textarea id="jsonInput" placeholder='{
  "vehicle_no": "DL1CA1234",
  "owner_name": "Sarthak",
  "history_of_challans": [
    {
      "Challan No": "CH12345",
      "Amount": "500",
      "Status": "Pending"
    }
  ]
}'></textarea>
        </div>

        <div class="controls">
            <button class="btn btn-secondary" onclick="clearInput()">Clear Editor</button>
            <button class="btn btn-primary" onclick="submitJson()">Sync to Database</button>
        </div>

        <div id="status" class="status-badge"></div>

        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        function clearInput() {
            document.getElementById('jsonInput').value = '';
            hideStatus();
        }

        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.innerText = msg;
            status.className = `status-badge ${type}`;
            status.style.display = 'block';
        }

        function hideStatus() {
            document.getElementById('status').style.display = 'none';
        }

        async function submitJson() {
            const input = document.getElementById('jsonInput').value.trim();
            hideStatus();

            if (!input) {
                showStatus("Please paste some JSON first", "error");
                return;
            }

            try {
                const body = JSON.parse(input);
                const res = await fetch('/api/save-json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();
                if (res.ok) {
                    showStatus(`Success! Synced ${data.results.vehicle_no}. Updated ${Object.keys(data.results.sections).length} sections.`, "success");
                } else {
                    showStatus(data.message || "Failed to sync data", "error");
                }
            } catch (err) {
                showStatus("Invalid JSON format. Please check your syntax.", "error");
            }
        }
    </script>
</body>
</html>
